<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Community</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="./images/logo.png" alt="Logo"> </div>
        <ul class="nav-links">
            <li><a href="#">Features</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Community</a></li>
            <li><a href="#">Support</a></li>
        </ul>
        <div class="nav-auth">
            <button class="btn-text">Log in</button>
            <button class="btn-filled">Register</button>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <h1>The largest community of photo enthusiasts</h1>
            <button class="btn-hero">Join Today</button>
            <div class="image-container">
                <img src="./images/hero.png" alt="Hero">
            </div>
        </section>

        <section class="body-section">
            <h2>Snap photos and share like never before</h2>
            <div class="image-container">
                <img src="./images/body.png" alt="Body">
            </div>
        </section>

        <section class="testimonials-section">
            <h3>You’re in good company</h3>
            <div class="user-avatar">
                <img src="./images/avatar.png" alt="Avatar">
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Photo Inc.</p>
    </footer>

</body>
</html>
